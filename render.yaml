# Render Blueprint — deploys the WHOLE DriverFlow project in one web service:
# Express API + Telegram bot + scheduler + the React admin UI (served at /admin)
# + the public landing site (/). New > Blueprint, point at this repo.
#
# IMPORTANT for Render free tier:
#  • DATABASE_URL (Supabase Postgres connection string) is REQUIRED —
#    the app stores everything in Supabase and won't start without it.
#  • Free Web Services sleep after ~15 min idle — the built-in keep-alive
#    (src/keepAlive.ts) pings /health using RENDER_EXTERNAL_URL to stay awake.
services:
  - type: web
    name: driverflow-bot
    runtime: node
    plan: free
    # build:all = compile the backend (tsc) AND build the React client.
    # --include=dev so devDependencies (TypeScript, Vite) are available even
    # though NODE_ENV=production is set.
    buildCommand: npm install --include=dev && npm run build:all
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Tashkent
      # Secrets — set these in the Render dashboard (sync:false = not in repo):
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Supabase Postgres connection string (required on Render for persistence):
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PRIVATE_CHANNEL_ID
        sync: false
      # Optional: override keep-alive interval (ms). Default 14 min.
      # - key: KEEPALIVE_INTERVAL_MS
      #   value: "840000"
