<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — DriverFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --bg: #030712;
      --surface: rgba(17, 24, 39, 0.7);
      --border: rgba(255,255,255,0.08);
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --danger: #ef4444;
      --radius: 16px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Animated mesh background */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,92,246,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 60% 20%, rgba(59,130,246,0.1) 0%, transparent 50%),
        var(--bg);
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 80%);
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      min-height: 100vh;
    }

    /* Left panel — branding */
    .brand-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
    }

    .brand-name {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-headline {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #fff 30%, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-desc {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 2.5rem;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      font-size: 0.9rem;
      color: #d1d5db;
    }

    .feature-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      flex-shrink: 0;
    }

    /* Right panel — form */
    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .form-card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .form-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.45);
    }

    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      align-items: center;
      gap: 0.5rem;
    }

    .error-msg.show { display: flex; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .brand-panel { display: none; }
      .form-panel { min-height: 100vh; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-overlay"></div>

  <div class="layout">
    <div class="brand-panel">
      <div class="brand-logo">
        <div class="brand-icon">🚛</div>
        <span class="brand-name">DriverFlow</span>
      </div>
      <h1 class="brand-headline">Driver approval,<br>simplified.</h1>
      <p class="brand-desc">Review uploads, manage companies, and publish approved drivers — all from one modern dashboard.</p>
      <div class="feature-list">
        <div class="feature-item"><span class="feature-dot"></span>Real-time Telegram integration</div>
        <div class="feature-item"><span class="feature-dot"></span>Batch image review workflow</div>
        <div class="feature-item"><span class="feature-dot"></span>Group broadcast &amp; channel sync</div>
      </div>
    </div>

    <div class="form-panel">
      <div class="form-card">
        <h2>Welcome back</h2>
        <p class="form-sub">Sign in to access the admin dashboard</p>
        <div class="error-msg" id="error"><span>⚠</span><span id="error-text"></span></div>
        <form id="loginForm">
          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" required placeholder="Enter admin password" autofocus>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const errorText = document.getElementById('error-text');
      const btn = document.getElementById('submitBtn');
      errorDiv.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (response.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          errorText.textContent = 'Invalid password. Please try again.';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        errorText.textContent = 'Connection error. Please try again.';
        errorDiv.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
