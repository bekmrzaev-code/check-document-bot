<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriverFlow — Verified Drivers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font: 'Inter', -apple-system, sans-serif;
      --bg: #f4f4f5;
      --surface: #fff;
      --surface-2: #fafafa;
      --border: #e4e4e7;
      --text: #09090b;
      --muted: #71717a;
      --accent: #6366f1;
      --accent-bg: #eef2ff;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --radius: 12px;
      --shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 20px rgba(0,0,0,0.04);
      --t: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-in { max-width: 900px; margin: 0 auto; padding: 0 1.25rem; height: 58px; display: flex; align-items: center; gap: 1rem; }
    .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit; }
    .logo-i { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; }
    .logo-t { font-weight: 800; font-size: 1rem; letter-spacing: -0.03em; }

    .wrap { max-width: 900px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

    .hero { margin-bottom: 1.5rem; }
    .hero h1 { font-size: 1.65rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.35rem; }
    .hero p { color: var(--muted); font-size: 0.9rem; }

    .stats { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.35rem 0.85rem; font-size: 0.78rem; color: var(--muted); box-shadow: var(--shadow); }
    .stat b { color: var(--text); font-weight: 700; }

    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
      margin-bottom: 0.75rem;
    }

    .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .tab {
      padding: 0.45rem 0.9rem; border: none; background: none; border-radius: 7px;
      font-family: var(--font); font-size: 0.8rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all var(--t);
    }
    .tab.active { background: var(--text); color: #fff; }

    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-wrap input {
      width: 100%; padding: 0.5rem 0.85rem 0.5rem 2.2rem;
      border: 1px solid var(--border); border-radius: 10px; font-family: var(--font);
      font-size: 0.85rem; background: var(--surface); transition: box-shadow var(--t);
    }
    .search-wrap input:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); border-color: var(--accent); }
    .search-wrap::before { content: '⌕'; position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }

    .hint { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.65rem; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }

    .row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.8rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background var(--t); user-select: none;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--surface-2); }
    .row.open { background: var(--accent-bg); }

    .num {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      background: #f4f4f5; border: 1px solid var(--border);
      padding: 0.15rem 0.4rem; border-radius: 4px; min-width: 1.85rem; text-align: center; flex-shrink: 0;
    }
    .row.open .num { background: var(--accent-bg); color: var(--accent); border-color: rgba(99,102,241,0.25); }

    .row-main { flex: 1; min-width: 0; }
    .row-title { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

    .row-end { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .chev { color: #a1a1aa; font-size: 0.7rem; transition: transform var(--t); }
    .row.open > .row-end .chev { transform: rotate(90deg); color: var(--accent); }

    .pill { font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 999px; background: #f4f4f5; border: 1px solid var(--border); color: var(--muted); }
    .pill.green { background: var(--success-bg); color: var(--success); border-color: rgba(16,185,129,0.2); }

    .expand {
      display: none; padding: 0 1rem 0.85rem 2.85rem;
      background: #fafafa; border-bottom: 1px solid var(--border);
      animation: up 0.2s ease;
    }
    .expand.show { display: block; }
    @keyframes up { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .driver-block { margin-top: 0.35rem; }
    .driver-block .row { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.35rem; padding: 0.6rem 0.75rem; background: var(--surface); }
    .driver-block .row:last-child { margin-bottom: 0; }

    .photos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 0.5rem; }
    .photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; cursor: pointer; background: #eee; transition: opacity var(--t); }
    .photos img:hover { opacity: 0.85; }

    .empty { text-align: center; padding: 3rem 1.5rem; color: var(--muted); }
    .empty .ico { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty h3 { color: var(--text); font-size: 0.95rem; margin-bottom: 0.25rem; }

    .pag {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted);
    }
    .pag-btns { display: flex; gap: 0.35rem; }
    .pag-btn {
      padding: 0.35rem 0.7rem; border: 1px solid var(--border); border-radius: 7px;
      background: var(--surface); font-family: var(--font); font-size: 0.78rem; font-weight: 500; cursor: pointer;
    }
    .pag-btn:hover:not(:disabled) { background: #f4f4f5; }
    .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pag-btn.on { background: var(--text); color: #fff; border-color: var(--text); }

    .lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 200; align-items: center; justify-content: center;
    }
    .lightbox.on { display: flex; }
    .lightbox img { max-width: 92%; max-height: 86vh; object-fit: contain; border-radius: 8px; }
    .lb-x { position: absolute; top: 1rem; right: 1rem; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; font-size: 1.1rem; }
    .lb-n, .lb-p { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; }
    .lb-p { left: 1rem; } .lb-n { right: 1rem; }
    .lb-info { position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.75); font-size: 0.85rem; }

    .kbd { font-size: 0.65rem; background: #f4f4f5; border: 1px solid var(--border); border-radius: 4px; padding: 0.1rem 0.35rem; font-family: inherit; }

    footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: #a1a1aa; }

    @media (max-width: 600px) {
      .photos { grid-template-columns: repeat(3, 1fr); }
      .expand { padding-left: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-in">
      <a class="logo" href="/"><div class="logo-i">🚛</div><span class="logo-t">DriverFlow</span></a>
    </div>
  </nav>

  <div class="wrap">
    <div class="hero">
      <h1>Verified drivers</h1>
      <p>Tap a company to see its drivers · tap a driver for photos</p>
    </div>

    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" id="tab-companies" onclick="setView('companies')">Companies</button>
        <button class="tab" id="tab-drivers" onclick="setView('drivers')">All Drivers</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search…  press /" oninput="onSearch()" />
      </div>
    </div>

    <p class="hint" id="hint">Click a row to expand · numbered <span class="kbd">&lt;1&gt;</span> <span class="kbd">&lt;2&gt;</span> …</p>

    <div id="content"><div class="panel"><div class="empty"><div class="ico">⏳</div><h3>Loading…</h3></div></div></div>
    <div id="pagination"></div>
  </div>

  <footer>DriverFlow · All profiles manually verified</footer>

  <div class="lightbox" id="lb" onclick="if(event.target===this)closeLb()">
    <img id="lb-img" src="" alt="">
    <button class="lb-x" onclick="closeLb()">✕</button>
    <button class="lb-p" onclick="lbPrev()">‹</button>
    <button class="lb-n" onclick="lbNext()">›</button>
    <div class="lb-info" id="lb-info"></div>
  </div>

  <script>
    const PAGE = 20;
    let companies = [], drivers = [], view = 'companies', query = '';
    let page = 1, openCompany = null, openDriver = null;
    let lbImages = [], lbIdx = 0, lbName = '';

    const num = n => `&lt;${n}&gt;`;
    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const imgUrl = i => i.file_id ? `/api/images/file/${encodeURIComponent(i.file_id)}` : i.message_id ? `/api/images/${i.message_id}` : '';

    async function load() {
      const [cR, dR] = await Promise.all([fetch('/api/companies'), fetch('/api/drivers')]);
      companies = cR.ok ? await cR.json() : [];
      drivers = dR.ok ? await dR.json() : [];
      renderStats();
      render();
    }

    function renderStats() {
      const withPhotos = drivers.filter(d => d.images?.length).length;
      document.getElementById('stats').innerHTML = `
        <span class="stat"><b>${companies.length}</b> companies</span>
        <span class="stat"><b>${drivers.length}</b> drivers</span>
        <span class="stat"><b>${withPhotos}</b> with photos</span>`;
    }

    function setView(v) {
      view = v; page = 1; openCompany = null; openDriver = null;
      document.getElementById('tab-companies').classList.toggle('active', v === 'companies');
      document.getElementById('tab-drivers').classList.toggle('active', v === 'drivers');
      document.getElementById('hint').textContent = v === 'companies'
        ? 'Click a company to see its drivers'
        : 'Click a driver to see photos';
      render();
    }

    function onSearch() {
      query = document.getElementById('search').value.trim().toLowerCase();
      page = 1; openCompany = null; openDriver = null;
      render();
    }

    function filterCompanies() {
      return companies.filter(c => {
        if (!query) return true;
        if (c.name.toLowerCase().includes(query)) return true;
        return drivers.some(d => d.company_id === c.id && d.name.toLowerCase().includes(query));
      });
    }

    function filterDrivers() {
      return drivers.filter(d => {
        if (!query) return true;
        const co = companies.find(c => c.id === d.company_id);
        return d.name.toLowerCase().includes(query) || (co?.name || '').toLowerCase().includes(query) || (d.truck_number || '').toLowerCase().includes(query);
      });
    }

    function paginate(items) {
      const pages = Math.max(1, Math.ceil(items.length / PAGE));
      const p = Math.min(page, pages);
      const start = (p - 1) * PAGE;
      return { items: items.slice(start, start + PAGE), p, pages, total: items.length, start };
    }

    function renderPagination(pg) {
      const el = document.getElementById('pagination');
      if (!pg.total) { el.innerHTML = ''; return; }
      if (pg.pages <= 1) {
        el.innerHTML = `<div class="pag" style="border:1px solid var(--border);border-radius:var(--radius);margin-top:0.5rem;background:var(--surface)"><span>${pg.total} total</span></div>`;
        return;
      }
      el.innerHTML = `
        <div class="pag" style="border:1px solid var(--border);border-radius:var(--radius);margin-top:0.5rem;background:var(--surface)">
          <span>${pg.start + 1}–${Math.min(pg.start + PAGE, pg.total)} of ${pg.total}</span>
          <div class="pag-btns">
            <button class="pag-btn" onclick="goPage(${pg.p - 1})" ${pg.p <= 1 ? 'disabled' : ''}>←</button>
            <button class="pag-btn on">${pg.p}/${pg.pages}</button>
            <button class="pag-btn" onclick="goPage(${pg.p + 1})" ${pg.p >= pg.pages ? 'disabled' : ''}>→</button>
          </div>
        </div>`;
    }

    function goPage(p) { page = p; openCompany = null; openDriver = null; render(); }

    function toggleCompany(id) {
      openCompany = openCompany === id ? null : id;
      openDriver = null;
      render();
    }

    function toggleDriver(id) {
      openDriver = openDriver === id ? null : id;
      render();
    }

    function companyDrivers(companyId) {
      return drivers.filter(d => d.company_id === companyId);
    }

    function driverPhotosHtml(d) {
      const imgs = (d.images || []).map(imgUrl).filter(Boolean);
      if (!imgs.length) return '<p style="font-size:0.75rem;color:var(--muted);margin-top:0.35rem">No photos</p>';
      return `<div class="photos">${imgs.slice(0, 8).map((src, i) =>
        `<img src="${src}" alt="" loading="lazy" onclick="event.stopPropagation();openLbById('${d.id}',${i})" onerror="this.remove()">`
      ).join('')}</div>`;
    }

    function renderCompaniesView() {
      const list = filterCompanies();
      const pg = paginate(list);
      if (!list.length) {
        document.getElementById('content').innerHTML = `<div class="panel"><div class="empty"><div class="ico">🔍</div><h3>Nothing found</h3><p>Try another search</p></div></div>`;
        renderPagination({ total: 0 }); return;
      }

      let html = '<div class="panel">';
      pg.items.forEach((c, i) => {
        const n = pg.start + i + 1;
        const cds = companyDrivers(c.id);
        const isOpen = openCompany === c.id;
        html += `
          <div class="row ${isOpen ? 'open' : ''}" onclick="toggleCompany('${c.id}')">
            <span class="num">${num(n)}</span>
            <div class="row-main">
              <div class="row-title">🏢 ${esc(c.name)}</div>
              <div class="row-sub">${cds.length} driver${cds.length !== 1 ? 's' : ''}</div>
            </div>
            <div class="row-end"><span class="pill">${cds.length} 👤</span><span class="chev">›</span></div>
          </div>
          <div class="expand ${isOpen ? 'show' : ''}">
            ${cds.length ? `<div class="driver-block">${cds.slice(0, 20).map((d, di) => {
              const dOpen = openDriver === d.id;
              return `
                <div class="row ${dOpen ? 'open' : ''}" onclick="event.stopPropagation();toggleDriver('${d.id}')">
                  <span class="num">${num(di + 1)}</span>
                  <div class="row-main">
                    <div class="row-title">${esc(d.name)}</div>
                    <div class="row-sub">${d.truck_number ? '🚛 ' + esc(d.truck_number) + ' · ' : ''}${(d.images?.length || 0)} photos</div>
                  </div>
                  <div class="row-end"><span class="pill green">✓</span><span class="chev">›</span></div>
                </div>
                ${dOpen ? `<div class="expand show" style="padding-left:0.5rem">${driverPhotosHtml(d)}</div>` : ''}`;
            }).join('')}${cds.length > 20 ? `<p style="font-size:0.75rem;color:var(--muted);padding:0.25rem">+ ${cds.length - 20} more</p>` : ''}</div>` : '<p style="font-size:0.8rem;color:var(--muted)">No drivers in this company</p>'}
          </div>`;
      });
      html += '</div>';
      document.getElementById('content').innerHTML = html;
      renderPagination(pg);
    }

    function renderDriversView() {
      const list = filterDrivers();
      const pg = paginate(list);
      if (!list.length) {
        document.getElementById('content').innerHTML = `<div class="panel"><div class="empty"><div class="ico">🔍</div><h3>Nothing found</h3></div></div>`;
        renderPagination({ total: 0 }); return;
      }

      let html = '<div class="panel">';
      pg.items.forEach((d, i) => {
        const n = pg.start + i + 1;
        const co = companies.find(c => c.id === d.company_id);
        const isOpen = openDriver === d.id;
        html += `
          <div class="row ${isOpen ? 'open' : ''}" onclick="toggleDriver('${d.id}')">
            <span class="num">${num(n)}</span>
            <div class="row-main">
              <div class="row-title">${esc(d.name)}</div>
              <div class="row-sub">${esc(co?.name || 'Unassigned')}${d.truck_number ? ' · 🚛 ' + esc(d.truck_number) : ''}</div>
            </div>
            <div class="row-end"><span class="pill green">✓</span><span class="chev">›</span></div>
          </div>
          <div class="expand ${isOpen ? 'show' : ''}">${driverPhotosHtml(d)}</div>`;
      });
      html += '</div>';
      document.getElementById('content').innerHTML = html;
      renderPagination(pg);
    }

    function render() {
      if (view === 'companies') renderCompaniesView();
      else renderDriversView();
    }

    function openLbById(driverId, imgIdx) {
      const d = drivers.find(x => x.id === driverId);
      if (!d) return;
      lbName = d.name;
      lbImages = (d.images || []).map(imgUrl).filter(Boolean);
      lbIdx = imgIdx;
      showLb();
    }

    function showLb() {
      if (!lbImages.length) return;
      document.getElementById('lb-img').src = lbImages[lbIdx];
      document.getElementById('lb-info').textContent = `${lbName} · ${lbIdx + 1}/${lbImages.length}`;
      document.getElementById('lb').classList.add('on');
      document.body.style.overflow = 'hidden';
    }

    function closeLb() { document.getElementById('lb').classList.remove('on'); document.body.style.overflow = ''; }
    function lbPrev() { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); }
    function lbNext() { lbIdx = (lbIdx + 1) % lbImages.length; showLb(); }

    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
        e.preventDefault(); document.getElementById('search').focus();
      }
      if (!document.getElementById('lb').classList.contains('on')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') lbPrev();
      if (e.key === 'ArrowRight') lbNext();
    });

    load();
  </script>
</body>
</html>
